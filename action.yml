name: 'Add File Header'
description: 'Add a header (e.g. copyright) at the beginning of files if not already present anywhere in the file.'
author: 'Vital de Nodrest (@vitaldenodrest)'

branding:
  icon: 'book-open'
  color: 'white'

inputs:
  text:
    description: 'The text to insert'
    required: true
  file_pattern:
    description: 'The files to target (e.g. *.py)'
    required: true
  ignore_shebangs:
    description: 'Insert after shebang if present'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Prepend Header
      shell: bash
      run: |
        HEADER="${{ inputs.text }}"
        PATTERN="${{ inputs.file_pattern }}"
        IGNORE_SHEBANG="${{ inputs.ignore_shebangs }}"

        # Find relevant files
        # Avoid .git to keep the index safe
        find . -name "$PATTERN" -not -path "./.git/*" -type f | while read -r file; do
          echo "Processing $file..."
          
          # Check presence of header in the file
          if grep -qF "$HEADER" "$file"; then
            echo "  -> Header already present. Skipping."
            continue
          fi

          FIRST_LINE=$(head -n 1 "$file")

          if [[ "$IGNORE_SHEBANG" == "true" ]] && [[ "$FIRST_LINE" =~ ^#! ]]; then
            echo "  -> Shebang detected. Inserting after first line."
            {
              echo "$FIRST_LINE"
              echo -e "$HEADER"
              tail -n +2 "$file"
            } > "$file.tmp" && mv "$file.tmp" "$file"
          else
            echo "  -> No shebang (or ignored). Inserting at top."
            {
              echo -e "$HEADER"
              cat "$file"
            } > "$file.tmp" && mv "$file.tmp" "$file"
          fi
          
          echo "  -> Done: $file"
        done
